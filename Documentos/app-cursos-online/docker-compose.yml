services:
  postgres:
    image: postgres:16-alpine
    container_name: courseforge-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: courseforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5441:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
